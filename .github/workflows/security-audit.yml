name: Security Audit

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # 毎日 06:00 UTC に実行し、新規公開された脆弱性を検出
    - cron: "0 6 * * *"

permissions:
  contents: read

jobs:
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: ".nvmrc"

      # .npmrc の ignore-scripts=true を尊重してインストール
      - name: Install dependencies
        run: npm ci

      # 1. 既知の脆弱性チェック
      # NOTE: 修正版が未リリースの推移的依存の脆弱性がある場合は
      # audit-level を一時的に引き上げてCIブロックを回避する
      - name: npm audit
        run: npm audit --audit-level=critical

      # 2. レジストリ署名の検証 (provenance attestation)
      - name: npm audit signatures
        run: npm audit signatures

      # 3. Lockfile検証
      - name: lockfile-lint
        run: npx lockfile-lint --path package-lock.json --type npm --allowed-hosts npm --validate-https --validate-integrity --validate-package-names

      # 4. Lockfile整合性チェック
      - name: Verify lockfile integrity
        run: node scripts/verify-lockfile.mjs

      # 5. Installスクリプト監査
      - name: Audit install scripts
        run: node scripts/audit-install-scripts.mjs

      # 6. Typosquatting検出
      - name: Check typosquatting
        run: node scripts/check-typosquat.mjs

      # 7. SBOM生成
      - name: Generate SBOM (CycloneDX)
        run: npm sbom --sbom-format cyclonedx > sbom.cdx.json

      - name: Upload SBOM
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: sbom
          path: sbom.cdx.json
